# ----------------------------------------
# CONFIGURACAO DO BANCO EM MEMORIA (H2)
# ----------------------------------------
spring.datasource.url=jdbc:h2:mem:lenpadb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Faz o Spring/Hibernate criar e atualizar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra no console os comandos SQL que o Spring esta fazendo
spring.jpa.show-sql=true

# ----------------------------------------
# CONSOLE DO H2 (Acesso pelo navegador)
# ----------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------
# SEGURANCA (A chave do JWT que fizemos)
# ----------------------------------------
api.security.token.secret=minha_senha_super_secreta_lenpa_123